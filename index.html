<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Egg Splat Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #87ceeb;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  #canvas-container { width: 100%; height: 100%; }
  #health-bar {
    position: absolute;
    transform: translate(-50%, -100%);
    display: flex;
    gap: 3px;
    background: rgba(0,0,0,0.35);
    padding: 4px;
    border-radius: 6px;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .segment {
    width: 18px; height: 12px;
    background: #2ecc40;
    border-radius: 2px;
    transition: background 0.2s;
    box-shadow: inset 0 -2px 0 rgba(0,0,0,0.25);
  }
  .segment.empty {
    background: #444 !important;
    box-shadow: inset 0 2px 3px rgba(0,0,0,0.4);
  }
  #reset-button {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 36px;
    background: linear-gradient(180deg, #ffd966 0%, #f5b700 100%);
    color: #2a1a00;
    border: 3px solid #b8860b;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    display: none;
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: inherit;
  }
  #reset-button:hover {
    transform: translateX(-50%) translateY(-2px);
    box-shadow: 0 8px 22px rgba(0,0,0,0.4);
  }
  #reset-button:active {
    transform: translateX(-50%) translateY(0);
  }
  #title {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%) rotate(-2.5deg);
    padding: 18px 38px 22px 38px;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ffae1f;
    /* Cartoon outline + drop shadow stack */
    -webkit-text-stroke: 2px #3a1d05;
    text-shadow:
      0 3px 0 #3a1d05,
      0 5px 0 rgba(58, 29, 5, 0.5),
      0 7px 10px rgba(0, 0, 0, 0.35);
    /* Fried egg-white blob: asymmetric border-radius + warm radial gradient */
    background: radial-gradient(ellipse 75% 70% at 48% 42%,
      #fffdf6 0%,
      #fff6df 55%,
      #f4e2b0 85%,
      #d9a85c 98%,
      #b8762e 100%);
    border-radius: 58% 42% 54% 46% / 48% 58% 42% 52%;
    box-shadow:
      0 0 0 1.5px rgba(140, 80, 25, 0.4),
      0 2px 0 rgba(120, 70, 20, 0.25),
      0 10px 22px rgba(0, 0, 0, 0.3);
    user-select: none;
    cursor: pointer;
    pointer-events: auto;
    transition: transform 0.18s ease-out, filter 0.18s ease-out;
  }
  #title:hover {
    transform: translateX(-50%) rotate(-2.5deg) scale(1.04);
    filter: brightness(1.08);
  }
  #title:active {
    transform: translateX(-50%) rotate(-2.5deg) scale(0.98);
  }
  #hud {
    position: absolute;
    top: 18px;
    right: 22px;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    opacity: 0.9;
    background: rgba(0,0,0,0.25);
    padding: 8px 14px;
    border-radius: 6px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    pointer-events: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-end;
  }
  #hud .stat {
    display: flex;
    align-items: baseline;
    gap: 8px;
    justify-content: flex-end;
    min-width: 90px;
  }
  #hud .num {
    display: inline-block;
    min-width: 2.4em;
    text-align: right;
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
  }

  /* Score reveal overlay — center-screen, scale-in punch */
  #score-reveal {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    color: #fff;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    font-weight: 800;
    will-change: transform, opacity;

    /* Medal: solid circle backdrop. Color is set via tier class. */
    width: 280px;
    height: 280px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 12px 32px rgba(0, 0, 0, 0.5),
      inset 0 -8px 18px rgba(0, 0, 0, 0.28),
      inset 0 6px 14px rgba(255, 255, 255, 0.22);
  }

  /* Medal tier colors. Each is a radial gradient offset to fake a highlight
     from above-left. Lower tiers get darker, more matte treatments. */
  #score-reveal.tier-gold {
    background: radial-gradient(circle at 32% 28%, #ffeb8c 0%, #f5c33a 45%, #b87a10 100%);
    border: 3px solid #d49520;
  }
  #score-reveal.tier-silver {
    background: radial-gradient(circle at 32% 28%, #f5f5fa 0%, #c8ccd4 45%, #7c8290 100%);
    border: 3px solid #9aa0ad;
  }
  #score-reveal.tier-bronze {
    background: radial-gradient(circle at 32% 28%, #f0bb88 0%, #c97a3a 45%, #6e3a14 100%);
    border: 3px solid #8b4a1c;
  }
  #score-reveal.tier-copper {
    background: radial-gradient(circle at 32% 28%, #e09a78 0%, #a8552e 45%, #5a2a14 100%);
    border: 3px solid #7a3a1c;
  }
  #score-reveal.tier-iron {
    background: radial-gradient(circle at 32% 28%, #8a8e95 0%, #50545c 45%, #2a2d33 100%);
    border: 3px solid #3a3d44;
  }
  #score-reveal.tier-rust {
    background: radial-gradient(circle at 32% 28%, #8a5a3a 0%, #5a3018 45%, #2a1408 100%);
    border: 3px solid #4a2410;
  }

  #score-reveal.show {
    animation: scoreLand 0.55s cubic-bezier(0.34, 1.7, 0.5, 1) forwards;
  }
  @keyframes scoreLand {
    0%   { transform: translate(-50%, -50%) scale(0);    opacity: 0; }
    60%  { transform: translate(-50%, -50%) scale(1.18); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1);    opacity: 1; }
  }
  #score-reveal .score-label {
    font-size: 12px;
    letter-spacing: 5px;
    opacity: 0.75;
    margin-bottom: 2px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  #score-reveal .score-value {
    font-size: 76px;
    letter-spacing: 2px;
    line-height: 1;
    color: #fff;
    text-shadow:
      0 2px 4px rgba(0,0,0,0.45),
      0 4px 16px rgba(0,0,0,0.35);
    font-variant-numeric: tabular-nums;
  }
  #score-reveal .score-rating {
    font-size: 16px;
    letter-spacing: 4px;
    margin-top: 10px;
    opacity: 0;
    text-transform: uppercase;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    max-width: 220px;
    line-height: 1.2;
  }
  #score-reveal.show .score-rating {
    animation: ratingFade 0.5s ease-out 0.35s forwards;
  }
  @keyframes ratingFade {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 0.95; transform: translateY(0); }
  }

  /* Difficulty selector — segmented two-button control, top-left */
  #difficulty-toggle {
    position: absolute;
    top: 18px;
    left: 22px;
    display: flex;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    overflow: hidden;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    user-select: none;
  }
  #difficulty-toggle .diff-btn {
    background: transparent;
    border: none;
    color: #aaa;
    padding: 6px 14px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
  }
  #difficulty-toggle .diff-btn:hover:not(:disabled):not(.active) {
    background: rgba(255,255,255,0.08);
    color: #ddd;
  }
  #difficulty-toggle .diff-btn.active {
    color: #fff;
  }
  #difficulty-toggle .diff-btn.active[data-diff="easy"] {
    background: rgba(46, 204, 64, 0.55);
  }
  #difficulty-toggle .diff-btn.active[data-diff="hard"] {
    background: rgba(231, 76, 60, 0.55);
  }
  #difficulty-toggle .diff-btn:disabled {
    cursor: not-allowed;
    opacity: 0.6;
  }

  /* Debug HUD */
  #debug-toggle {
    position: absolute;
    top: 56px;
    left: 22px;
    color: #aaa;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    font-family: inherit;
  }
  #debug-toggle.on {
    color: #2ecc40;
    border-color: rgba(46, 204, 64, 0.6);
  }
  #debug-panel {
    position: absolute;
    top: 94px;
    left: 22px;
    color: #ffd966;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255, 217, 102, 0.25);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    letter-spacing: 1px;
    font-family: 'Courier New', monospace;
    font-weight: 700;
    line-height: 1.5;
    display: none;
    pointer-events: none;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  #debug-panel.show { display: block; }
  #debug-panel .label { color: #888; margin-right: 6px; }
  #debug-panel .mult.active { color: #ff6b6b; }
  #debug-hp {
    position: absolute;
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Courier New', monospace;
    transform: translate(-50%, -50%);
    pointer-events: none;
    display: none;
    border: 1px solid rgba(255,255,255,0.2);
    white-space: nowrap;
  }
  #debug-hp.show { display: block; }
  .damage-popup {
    position: absolute;
    color: #ff5555;
    font-weight: 900;
    font-size: 22px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.7), 0 0 12px rgba(255,0,0,0.4);
    pointer-events: none;
    font-family: 'Courier New', monospace;
    transform: translate(-50%, -50%);
    will-change: transform, opacity;
    animation: damageFloat 0.9s ease-out forwards;
  }
  @keyframes damageFloat {
    0%   { opacity: 0;   transform: translate(-50%, -50%) scale(0.5); }
    15%  { opacity: 1;   transform: translate(-50%, -85%) scale(1.2); }
    100% { opacity: 0;   transform: translate(-50%, -180%) scale(0.9); }
  }
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="title">Crack the Egg</div>
<div id="health-bar"></div>
<div id="difficulty-toggle">
  <button class="diff-btn active" data-diff="easy">Easy</button>
  <button class="diff-btn" data-diff="hard">Hard</button>
</div>
<button id="debug-toggle">Debug: Off</button>
<div id="debug-panel">
  <div><span class="label">HP</span><span class="hp-num">—</span></div>
  <div><span class="label">Score</span><span class="score-num">0</span></div>
  <div><span class="label">Streak</span><span class="streak-num">0</span></div>
  <div><span class="label">Mult</span><span class="mult">1.0×</span></div>
  <div><span class="label">Frantic</span><span class="frantic-num">0.00</span></div>
</div>
<div id="debug-hp">HP: 0</div>
<div id="hud">
  <span class="stat">Shots <span class="num shots-num">0</span></span>
  <span class="stat">Time <span class="num time-num">0.0</span>s</span>
</div>
<div id="score-reveal">
  <div class="score-label">Score</div>
  <div class="score-value">0</div>
  <div class="score-rating"></div>
</div>
<button id="reset-button">↻ Reset</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  const container = document.getElementById('canvas-container');
  const healthBarEl = document.getElementById('health-bar');
  const resetBtn = document.getElementById('reset-button');
  const titleEl = document.getElementById('title');
  const hudEl = document.getElementById('hud');
  const shotsNumEl = hudEl.querySelector('.shots-num');
  const timeNumEl = hudEl.querySelector('.time-num');
  const scoreRevealEl = document.getElementById('score-reveal');
  const scoreValueEl = scoreRevealEl.querySelector('.score-value');
  const scoreRatingEl = scoreRevealEl.querySelector('.score-rating');

  // Debug HUD elements
  const debugToggleBtn = document.getElementById('debug-toggle');
  const debugPanelEl = document.getElementById('debug-panel');
  const debugHpEl = document.getElementById('debug-hp');
  const debugHpNumEl = debugPanelEl.querySelector('.hp-num');
  const debugScoreNumEl = debugPanelEl.querySelector('.score-num');
  const debugStreakNumEl = debugPanelEl.querySelector('.streak-num');
  const debugMultEl = debugPanelEl.querySelector('.mult');
  const debugFranticNumEl = debugPanelEl.querySelector('.frantic-num');
  let debugMode = false;
  const damagePopups = [];      // {el, born, lifeMs}

  // Difficulty selector
  const diffToggleEl = document.getElementById('difficulty-toggle');
  const diffBtnEls = Array.from(diffToggleEl.querySelectorAll('.diff-btn'));

  function setDifficulty(key) {
    if (!DIFFICULTIES[key]) return;
    difficulty = DIFFICULTIES[key];
    diffBtnEls.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.diff === key);
    });
    // Apply to current state. If the round hasn't started yet, this just
    // adjusts the freshly-spawned egg's HP. We don't allow switching mid-
    // round (buttons are disabled), so we don't need to worry about live state.
    if (!timerRunning && alive) {
      startingHP = difficulty.hp;
      hp = startingHP;
      updateHealthBar();
      updateDebugHud();
    }
  }
  function setDifficultyLock(locked) {
    diffBtnEls.forEach(btn => { btn.disabled = locked; });
  }

  diffBtnEls.forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      setDifficulty(btn.dataset.diff);
    });
  });

  debugToggleBtn.addEventListener('click', () => {
    debugMode = !debugMode;
    debugToggleBtn.textContent = 'Debug: ' + (debugMode ? 'On' : 'Off');
    debugToggleBtn.classList.toggle('on', debugMode);
    debugPanelEl.classList.toggle('show', debugMode);
    debugHpEl.classList.toggle('show', debugMode && alive);
    updateDebugHud();
  });

  function updateDebugHud() {
    // Cheap text writes even when hidden — keeps the panel in sync the
    // moment the user toggles it on.
    debugHpNumEl.textContent = Math.max(0, hp) + ' / ' + startingHP;
    // Live "running score" = points * accuracy * speed using current elapsed
    const liveScore = (function() {
      if (shots === 0) return 0;
      const ms = timerRunning ? (performance.now() - roundStartMs) : roundElapsedMs;
      const seconds = Math.max(0.1, ms / 1000);
      const accuracy = hits / shots;
      const speed = 10 / seconds;
      return Math.round(pointsAccumulated * accuracy * speed * difficulty.pointsMultiplier);
    })();
    debugScoreNumEl.textContent = liveScore;
    debugStreakNumEl.textContent = streak;
    const m = currentMultiplier();
    debugMultEl.textContent = m.toFixed(1) + '×';
    debugMultEl.classList.toggle('active', m > 1);
    debugFranticNumEl.textContent = franticness().toFixed(2);
  }

  // Position the floating HP bubble above the egg every frame in debug mode.
  const _debugHpAnchor = new THREE.Vector3();
  function positionDebugHp() {
    if (!debugMode || !alive) { debugHpEl.classList.remove('show'); return; }
    debugHpEl.classList.add('show');
    _debugHpAnchor.set(eggGroup.position.x, eggGroup.position.y + 1.2, eggGroup.position.z);
    _debugHpAnchor.project(camera);
    const x = (_debugHpAnchor.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-_debugHpAnchor.y * 0.5 + 0.5) * window.innerHeight;
    debugHpEl.style.left = x + 'px';
    debugHpEl.style.top  = y + 'px';
    debugHpEl.textContent = 'HP ' + Math.max(0, hp);
  }

  // Damage popup: floats up from the hit point in screen space.
  const _popupAnchor = new THREE.Vector3();
  function spawnDamagePopup(worldPoint, damage) {
    _popupAnchor.copy(worldPoint).project(camera);
    const x = (_popupAnchor.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-_popupAnchor.y * 0.5 + 0.5) * window.innerHeight;
    const el = document.createElement('div');
    el.className = 'damage-popup';
    el.textContent = '-' + damage;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    document.body.appendChild(el);
    damagePopups.push({ el, born: performance.now(), lifeMs: 900 });
  }

  function updateDamagePopups() {
    const now = performance.now();
    for (let i = damagePopups.length - 1; i >= 0; i--) {
      const p = damagePopups[i];
      if (now - p.born >= p.lifeMs) {
        p.el.remove();
        damagePopups.splice(i, 1);
      }
    }
  }

  // ---------- Scene & background ----------
  const scene = new THREE.Scene();

  // Sky gradient via canvas texture
  const skyCanvas = document.createElement('canvas');
  skyCanvas.width = 4; skyCanvas.height = 256;
  const skyCtx = skyCanvas.getContext('2d');
  const skyGrad = skyCtx.createLinearGradient(0, 0, 0, 256);
  skyGrad.addColorStop(0,    '#3a7bd5');
  skyGrad.addColorStop(0.55, '#83b8e8');
  skyGrad.addColorStop(1,    '#d4ebf7');
  skyCtx.fillStyle = skyGrad;
  skyCtx.fillRect(0, 0, 4, 256);
  scene.background = new THREE.CanvasTexture(skyCanvas);

  // ---------- Camera ----------
  const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 3.0, 5.2);
  camera.lookAt(0, 1.0, 0);

  // ---------- Renderer ----------
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  container.appendChild(renderer.domElement);

  // ---------- Lights ----------
  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  scene.add(new THREE.HemisphereLight(0xbfdcff, 0x6a5040, 0.35));

  const sun = new THREE.DirectionalLight(0xfff2d6, 1.15);
  sun.position.set(5, 8, 4);
  sun.castShadow = true;
  sun.shadow.mapSize.width = 2048;
  sun.shadow.mapSize.height = 2048;
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 30;
  sun.shadow.camera.left = -5;
  sun.shadow.camera.right = 5;
  sun.shadow.camera.top = 5;
  sun.shadow.camera.bottom = -5;
  sun.shadow.bias = -0.0005;
  scene.add(sun);

  // ---------- Cast iron pan surface ----------
  function makeIronTexture() {
    const c = document.createElement('canvas');
    c.width = 1024; c.height = 1024;
    const ctx = c.getContext('2d');
    // Base dark
    ctx.fillStyle = '#1f1a16';
    ctx.fillRect(0, 0, 1024, 1024);
    // Tiny speckles
    for (let i = 0; i < 30000; i++) {
      const x = Math.random() * 1024;
      const y = Math.random() * 1024;
      const r = Math.random() * 1.4 + 0.3;
      const dark = Math.random() < 0.6;
      ctx.fillStyle = dark
        ? `rgba(0,0,0,${0.25 + Math.random()*0.45})`
        : `rgba(110,95,75,${0.04 + Math.random()*0.18})`;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fill();
    }
    // Larger soft smudges
    for (let i = 0; i < 400; i++) {
      const x = Math.random() * 1024;
      const y = Math.random() * 1024;
      const r = Math.random() * 80 + 20;
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
      const dark = Math.random() < 0.7;
      const color = dark ? '20,15,10' : '80,65,50';
      grad.addColorStop(0, `rgba(${color},0.18)`);
      grad.addColorStop(1, `rgba(${color},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fill();
    }
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.anisotropy = 8;
    return tex;
  }

  const ironTex = makeIronTexture();
  ironTex.repeat.set(1.5, 1.5);

  const panGeo = new THREE.CircleGeometry(7, 96);
  const panMat = new THREE.MeshStandardMaterial({
    map: ironTex,
    color: 0xffffff,
    roughness: 0.78,
    metalness: 0.35
  });
  const pan = new THREE.Mesh(panGeo, panMat);
  pan.rotation.x = -Math.PI/2;
  pan.receiveShadow = true;
  scene.add(pan);

  // ---------- Egg ----------
  const eggGroup = new THREE.Group();
  const EGG_SCALE = 0.5;            // shrink egg → more area to move in, harder to hit
  const EGG_Y = 0.78 * EGG_SCALE;   // keep base of rounded bottom on the pan
  eggGroup.position.y = EGG_Y;
  scene.add(eggGroup);

  // Build egg shape from real chicken egg proportions:
  //   - aspect ratio ~1.4 (height : width)
  //   - widest point ~43% up from the bottom
  //   - BOTTOM is rounded (half-ellipsoid — vertical tangent at the south pole)
  //   - TOP is a parabolic taper to a point
  //   - Halves meet at the equator with matching horizontal tangent (no crease)
  const eggGeo = new THREE.SphereGeometry(1.0, 96, 64);
  const positions = eggGeo.attributes.position;

  const MAX_RADIUS    = 0.65;   // egg half-width at the widest point
  const BOTTOM_HEIGHT = 0.78;   // distance from widest point down to bottom
  const TOP_HEIGHT    = 1.05;   // distance from widest point up to point
  // Total height ≈ 1.83, max width = 1.30 → aspect ratio ≈ 1.41

  for (let i = 0; i < positions.count; i++) {
    const sx = positions.getX(i);
    const sy = positions.getY(i);
    const sz = positions.getZ(i);

    // Linear map sphere-y (-1..1) to egg-y (-BOTTOM..+TOP)
    const y_egg = (sy + 1) * 0.5 * (BOTTOM_HEIGHT + TOP_HEIGHT) - BOTTOM_HEIGHT;

    // Egg radius at this height
    let r_egg;
    if (y_egg <= 0) {
      // Bottom half: half-ellipse, gives a rounded bottom (vertical tangent at y=-BOTTOM)
      const u = y_egg / BOTTOM_HEIGHT;
      r_egg = MAX_RADIUS * Math.sqrt(Math.max(0, 1 - u*u));
    } else {
      // Top half: half-ellipse with a taller vertical axis (TOP_HEIGHT > BOTTOM_HEIGHT).
      // Same form as the bottom → also has a vertical tangent at the tip → rounded,
      // not pointed. The longer semi-axis just makes the top look more elongated.
      const u = y_egg / TOP_HEIGHT;
      r_egg = MAX_RADIUS * Math.sqrt(Math.max(0, 1 - u*u));
    }

    // Scale (sx, sz) to the new radius, preserving longitude
    const sr = Math.sqrt(sx*sx + sz*sz);
    if (sr > 1e-6) {
      const scale = r_egg / sr;
      positions.setX(i, sx * scale);
      positions.setZ(i, sz * scale);
    }
    // (At the poles sx=sz=0, leave unchanged)
    positions.setY(i, y_egg);
  }
  positions.needsUpdate = true;
  eggGeo.computeVertexNormals();

  function makeShellTexture() {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#f7eed7';
    ctx.fillRect(0, 0, 512, 512);
    for (let i = 0; i < 1500; i++) {
      const x = Math.random() * 512;
      const y = Math.random() * 512;
      const r = Math.random() * 1.3 + 0.2;
      ctx.fillStyle = `rgba(168,135,90,${0.05 + Math.random()*0.18})`;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fill();
    }
    return new THREE.CanvasTexture(c);
  }

  const shellMat = new THREE.MeshStandardMaterial({
    map: makeShellTexture(),
    color: 0xfaf2dd,
    roughness: 0.55,
    metalness: 0.04
  });
  const eggMesh = new THREE.Mesh(eggGeo, shellMat);
  eggMesh.scale.setScalar(EGG_SCALE);
  eggMesh.castShadow = true;
  eggMesh.receiveShadow = true;
  eggGroup.add(eggMesh);

  // ---------- Difficulty ----------
  // Each difficulty bundles HP, frantic-state behavior, streak growth, and
  // a final-score multiplier. Selectable pre-round; locked during play.
  const DIFFICULTIES = {
    easy: {
      name: 'Easy',
      hp: 80,
      dashThreshold: 0.45,         // franticness needed before dashes start
      dashStrength: 0.55,          // probability scaling factor at full frantic
      streakGrowth: 0.5,           // mult increment per hit past streak threshold
      streakCap: 5,
      pointsMultiplier: 1.0
    },
    hard: {
      name: 'Hard',
      hp: 120,
      dashThreshold: 0.30,         // dashes begin earlier in the round
      dashStrength: 0.85,          // ~50% chance at full frantic vs ~30% on easy
      streakGrowth: 0.75,          // multiplier ramps up faster to compensate
      streakCap: 7,
      pointsMultiplier: 1.5        // raw points boosted to keep score brag-worthy
    }
  };
  let difficulty = DIFFICULTIES.easy;

  // ---------- Game state ----------
  let startingHP = difficulty.hp;
  let hp = startingHP;
  let alive = true;

  // Health bar is hidden in normal play (see positionHealthBar); kept around
  // for visual continuity in case we re-enable it later.
  function buildHealthBar() {
    healthBarEl.innerHTML = '';
    // Single proportional bar instead of discrete segments
    const seg = document.createElement('div');
    seg.className = 'segment';
    seg.style.width = '100%';
    healthBarEl.appendChild(seg);
  }

  function updateHealthBar() {
    const seg = healthBarEl.querySelector('.segment');
    if (!seg) return;
    const pct = Math.max(0, hp / startingHP);
    seg.style.width = (pct * 100) + '%';
    if (pct <= 0.25)      seg.style.background = '#e74c3c';
    else if (pct <= 0.5)  seg.style.background = '#f39c12';
    else                  seg.style.background = '#2ecc40';
  }

  const healthAnchor = new THREE.Vector3();
  function positionHealthBar() {
    // Health bar is hidden in normal play — the player doesn't get HP info.
    // Debug mode uses a separate floating element (see debugHpEl below).
    healthBarEl.style.opacity = '0';
  }

  // ---------- Particles (spurt) ----------
  const particles = [];
  const GRAVITY = -16;

  function spawnSpurt(worldPos, normal) {
    // Whites — random horizontal direction with strong upward bias.
    // The hit normal isn't used here on purpose: real cracking eggs splatter
    // every which way, not as a directed jet away from the impact.
    for (let i = 0; i < 14; i++) {
      const r = 0.04 + Math.random()*0.03;
      const geo = new THREE.SphereGeometry(r, 8, 8);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xfff8e8,
        transparent: true, opacity: 0.9,
        roughness: 0.2, metalness: 0
      });
      const m = new THREE.Mesh(geo, mat);
      m.position.copy(worldPos);
      const angle = Math.random() * Math.PI * 2;
      const horizSpeed = 1.2 + Math.random()*2.4;
      const vertSpeed = 2.6 + Math.random()*2.4;
      const v = new THREE.Vector3(
        Math.cos(angle) * horizSpeed,
        vertSpeed,
        Math.sin(angle) * horizSpeed
      );
      scene.add(m);
      particles.push({ mesh: m, vel: v, type: 'white', size: r });
    }
    // Yolk droplets — fewer, slightly slower, same 360° spread
    for (let i = 0; i < 6; i++) {
      const r = 0.05 + Math.random()*0.04;
      const geo = new THREE.SphereGeometry(r, 10, 10);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xffaa1a,
        emissive: 0x3a1f00, emissiveIntensity: 0.5,
        roughness: 0.25, metalness: 0
      });
      const m = new THREE.Mesh(geo, mat);
      m.position.copy(worldPos);
      const angle = Math.random() * Math.PI * 2;
      const horizSpeed = 0.9 + Math.random()*2.0;
      const vertSpeed = 2.2 + Math.random()*2.2;
      const v = new THREE.Vector3(
        Math.cos(angle) * horizSpeed,
        vertSpeed,
        Math.sin(angle) * horizSpeed
      );
      scene.add(m);
      particles.push({ mesh: m, vel: v, type: 'yolk', size: r });
    }
  }

  // ---------- Splat decals on pan ----------
  const splats = [];
  function spawnSplat(x, z, type, size) {
    const r = (type === 'yolk' ? size * 4.0 : size * 5.5);
    const geo = new THREE.CircleGeometry(r, 18);
    // Distort the circle vertices for irregular splat
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const px = pos.getX(i), py = pos.getY(i);
      if (px === 0 && py === 0) continue;
      const wob = 0.65 + Math.random()*0.65;
      pos.setX(i, px * wob);
      pos.setY(i, py * wob);
    }
    pos.needsUpdate = true;
    const color = type === 'yolk' ? 0xffaa1a : 0xfff5dc;
    const mat = new THREE.MeshStandardMaterial({
      color, transparent: true,
      opacity: type === 'yolk' ? 0.95 : 0.78,
      roughness: 0.18, metalness: 0,
      emissive: type === 'yolk' ? 0x331100 : 0x000000,
      emissiveIntensity: type === 'yolk' ? 0.25 : 0,
      polygonOffset: true,
      polygonOffsetFactor: -1,
      polygonOffsetUnits: -1,
      depthWrite: false
    });
    const m = new THREE.Mesh(geo, mat);
    m.rotation.x = -Math.PI/2;
    // Stack slightly so multiple splats don't z-fight badly
    m.position.set(x, 0.005 + splats.length * 0.0008, z);
    scene.add(m);
    splats.push(m);
  }

  // ---------- Cracks on the egg ----------
  const cracks = [];
  function spawnCrack(localPos, localNormal) {
    const crackGroup = new THREE.Group();
    const segCount = 4 + Math.floor(Math.random()*3);
    const mat = new THREE.MeshBasicMaterial({ color: 0x1a0e04 });
    for (let i = 0; i < segCount; i++) {
      const len = 0.07 + Math.random()*0.11;
      const w = 0.005 + Math.random()*0.005;
      const geo = new THREE.PlaneGeometry(len, w);
      const seg = new THREE.Mesh(geo, mat);
      seg.rotation.z = Math.random() * Math.PI * 2;
      seg.position.set(
        (Math.random()-0.5)*0.04,
        (Math.random()-0.5)*0.04,
        0
      );
      crackGroup.add(seg);
    }
    crackGroup.position.copy(localPos);
    // Orient outward
    const lookOut = localPos.clone().add(localNormal);
    crackGroup.lookAt(lookOut);
    // Push slightly out so crack sits ON the surface
    crackGroup.position.add(localNormal.clone().multiplyScalar(0.003));
    eggMesh.add(crackGroup);
    cracks.push(crackGroup);
  }

  // ---------- Squash animation ----------
  let squashT = 0;
  let squashing = false;
  function squashEgg() {
    squashT = 0;
    squashing = true;
  }
  function updateSquash(dt) {
    if (!squashing) return;
    squashT += dt;
    const dur = 0.22;
    if (squashT >= dur) {
      eggGroup.scale.set(1, 1, 1);
      squashing = false;
      return;
    }
    const t = squashT / dur;
    const s = Math.sin(t * Math.PI);
    eggGroup.scale.set(1 + s*0.13, 1 - s*0.13, 1 + s*0.13);
  }

  // ---------- Hopping movement ----------
  // The egg hops left/right. Movement follows a RUN/FEINT pattern (like a
  // running back or dribbler): commit to a direction for a few hops, then
  // sometimes throw a short feint the other way before cutting back. As HP
  // drops, runs get shorter and feints come more often.
  const hop = {
    vx: 0,                 // horizontal velocity (X axis only — pure left/right)
    vy: 0,                 // vertical velocity
    gravity: -18,          // per-hop gravity; scales stronger when frantic (see startHop)
    airborne: false,
    restTimer: 0.6,        // brief startup pause so the egg doesn't launch on load
    dir: Math.random() < 0.5 ? -1 : 1,

    // Run/feint state
    mode: 'run',           // 'run' | 'feint'
    hopsLeft: 3,           // hops remaining in the current mode before deciding next
    committedDir: 1        // the "real" direction we keep returning to; feint goes -committedDir
  };
  hop.committedDir = hop.dir;

  // Screen-space safety margin (px) so the egg can't drift behind UI / off-screen.
  const SCREEN_MARGIN_X = 70;
  const _projVec = new THREE.Vector3();
  function eggScreenX() {
    _projVec.set(eggGroup.position.x, EGG_Y, eggGroup.position.z).project(camera);
    return (_projVec.x * 0.5 + 0.5) * window.innerWidth;
  }

  // Franticness: 0 at full HP, 1 at death. Steepened curve (pow 0.5 → pow 0.4)
  // so the egg ramps to challenging behavior sooner — the first ~25% of damage
  // already feels notably more active.
  function franticness() {
    const linear = (startingHP - hp) / startingHP;
    return Math.pow(Math.max(0, linear), 0.4);
  }

  // Pick the next movement plan: how many hops in which direction, run or feint.
  // Called whenever the current plan's hopsLeft hits zero.
  //
  // Pattern intent (running back / dribbler):
  //   RUN → FEINT → RUN (in new direction)        [classic juke]
  //   RUN → RUN (in new direction)                [direct cut, no feint]
  //   RUN → FEINT → RUN (back in original)        [feint was pure misdirection]
  // The committed direction tracks the "real" run; feints temporarily go opposite.
  //
  // Edge awareness: if we're near a screen edge, feinting outward is suppressed
  // and the next plan is forced to a committed inward run — otherwise the egg
  // looks like it's vibrating against the wall.
  function pickNextPlan(f) {
    const nearLeft  = eggScreenX() < SCREEN_MARGIN_X + 60;
    const nearRight = eggScreenX() > window.innerWidth - SCREEN_MARGIN_X - 60;
    const nearEdge  = nearLeft || nearRight;

    if (nearEdge) {
      // Wall-cut: commit inward for a longer-than-usual run. No feint —
      // a feint here would just hop back toward the wall.
      hop.committedDir = nearLeft ? 1 : -1;
      hop.mode = 'run';
      hop.hopsLeft = runLength(f) + 1;        // a little extra to clear the edge
      hop.dir = hop.committedDir;
      return;
    }

    if (hop.mode === 'run') {
      // After a run, three possible follow-ups:
      //   - Dash: a fast, low, long horizontal commit (frantic only)
      //   - Feint: a 1-2 hop juke against the committed direction
      //   - Direct cut: commit to opposite direction immediately
      // Dash: a fast, low, long horizontal commit (frantic only). Threshold
      // and strength are difficulty-tunable.
      const dashChance = Math.max(0, (f - difficulty.dashThreshold)) * difficulty.dashStrength;
      if (Math.random() < dashChance) {
        // Dash continues in the *current* committed direction — a desperate
        // breakaway sprint. Single "hop" but with dash-mode physics.
        hop.mode = 'dash';
        hop.hopsLeft = 1;
        hop.dir = hop.committedDir;
        return;
      }
      const feintChance = 0.55 + f * 0.30;       // 0.55 calm → 0.85 frantic
      if (Math.random() < feintChance) {
        hop.mode = 'feint';
        hop.hopsLeft = feintLength();
        hop.dir = -hop.committedDir;
      } else {
        // Direct cut: commit to a new direction with no feint
        hop.committedDir = -hop.committedDir;
        hop.mode = 'run';
        hop.hopsLeft = runLength(f);
        hop.dir = hop.committedDir;
      }
    } else if (hop.mode === 'feint') {
      // Feint ending. Either it was misdirection (resume original committed
      // direction) or it was *the cut itself* (commit to the feint direction).
      // The latter is what actually makes the juke effective — the aim has
      // adjusted to the run, the feint pulls aim back, then we commit to the
      // feint direction. When frantic, lean more toward the commit-to-feint
      // case because it's the more disruptive pattern.
      const commitToFeintChance = 0.55 + f * 0.20;  // 0.55 calm → 0.75 frantic
      if (Math.random() < commitToFeintChance) {
        hop.committedDir = hop.dir;     // the feint direction *is* the new run
      }
      // else: keep committedDir the same — feint was misdirection, run continues
      hop.mode = 'run';
      hop.hopsLeft = runLength(f);
      hop.dir = hop.committedDir;
    } else {
      // Dash ending. After a dash, the egg often commits to a fresh run in
      // the *opposite* direction (the dash overshot, now it cuts back).
      hop.committedDir = -hop.dir;
      hop.mode = 'run';
      hop.hopsLeft = runLength(f);
      hop.dir = hop.committedDir;
    }
  }

  function runLength(f) {
    // Calm: 2–6 hops with high variance. Frantic: 1–4 hops with high variance.
    // Wide range matters more than the mean — it's what makes the feint cadence
    // feel non-metronomic, since feints happen at run-boundaries.
    const minLen = Math.max(1, Math.round(2 - f));        // 2 calm → 1 frantic
    const maxLen = Math.round(6 - f * 2);                 // 6 calm → 4 frantic
    return minLen + Math.floor(Math.random() * (maxLen - minLen + 1));
  }

  function feintLength() {
    // 1, 2, or 3 hops — weighted toward shorter. Single-hop feints are the
    // sharp ones; 2-3 hop feints are the longer setup jukes.
    const r = Math.random();
    if (r < 0.55) return 1;
    if (r < 0.90) return 2;
    return 3;
  }

  function startHop() {
    const f = franticness();

    // If we've used up the current plan, OR we're near a screen edge and the
    // current plan would push outward, force a re-plan. The edge-handling
    // logic lives inside pickNextPlan.
    const sx = eggScreenX();
    const wouldExitLeft  = sx < SCREEN_MARGIN_X + 60 && hop.dir < 0;
    const wouldExitRight = sx > window.innerWidth - SCREEN_MARGIN_X - 60 && hop.dir > 0;
    if (hop.hopsLeft <= 0 || wouldExitLeft || wouldExitRight) {
      pickNextPlan(f);
    }

    // Horizontal speed: feints slightly faster (snappy juke), dashes much
    // faster (breakaway sprint), runs steady.
    const baseSpeed = 2.4 + f * 1.0;
    let speed;
    if      (hop.mode === 'feint') speed = baseSpeed * 1.1;
    else if (hop.mode === 'dash')  speed = baseSpeed * 2.2;     // ~5.5 at frantic
    else                           speed = baseSpeed;

    // Vertical kick: shrinks as franticness grows. Dashes are low and flat
    // (skim-the-pan), feints a bit lower than runs.
    const baseUp = 3.2 - f * 1.6;
    let upSpeed;
    if      (hop.mode === 'dash')  upSpeed = baseUp * 0.55;     // very low arc
    else if (hop.mode === 'feint') upSpeed = baseUp * 0.85;
    else                           upSpeed = baseUp;

    // Gravity scales up when frantic too, so hops land *fast* — peak height
    // stays small and airtime collapses, which is the "skittish" read.
    hop.gravity = -18 - f * 14;             // -18 calm → -32 frantic

    hop.vx = hop.dir * speed;
    hop.vy = upSpeed;
    hop.airborne = true;
    hop.hopsLeft--;
  }

  function updateHop(dt) {
    if (!alive) return;

    if (hop.airborne) {
      hop.vy += hop.gravity * dt;
      eggGroup.position.x += hop.vx * dt;
      eggGroup.position.y += hop.vy * dt;

      // Mid-air edge clamp: if we'd cross the margin during this hop, just
      // pin to the margin and zero horizontal velocity. No reversal — that
      // was creating wall-pong. The next startHop will reorient inward.
      const sx = eggScreenX();
      if (sx < SCREEN_MARGIN_X && hop.vx < 0)                          hop.vx = 0;
      else if (sx > window.innerWidth - SCREEN_MARGIN_X && hop.vx > 0) hop.vx = 0;

      // Landing
      if (eggGroup.position.y <= EGG_Y && hop.vy < 0) {
        eggGroup.position.y = EGG_Y;
        hop.vy = 0;
        hop.vx = 0;
        hop.airborne = false;
        squashEgg();                         // landing impact squash — reuses tuned animation
        const f = franticness();
        // No breather after a dash — keeps the chaos going.
        const baseRest = (hop.mode === 'dash') ? 0.02 : (0.40 - f * 0.39);
        hop.restTimer = baseRest;
      }
    } else {
      hop.restTimer -= dt;
      if (hop.restTimer <= 0) startHop();
    }
  }


  // ---------- Hit / raycast ----------
  const raycaster = new THREE.Raycaster();
  const pointer = new THREE.Vector2();

  // Score / damage / multiplier state ---------------------------------------
  // Each successful hit awards points based on shot quality (dartboard-style:
  // bullseye → ring → outer), times the active streak multiplier. Hits also
  // do damage scaled to quality — a bullseye does ~16 damage, an edge graze
  // does ~4. Average ~10/hit means a 100-HP egg dies in ~10 well-placed hits.
  let hits = 0;                         // successful hits this round
  let pointsAccumulated = 0;
  let streak = 0;                       // consecutive hits without a miss
  const STREAK_MULTIPLIER_START = 3;    // hits before multiplier kicks in
  function currentMultiplier() {
    // 1× until streak hits the threshold, then 1.5× and grows by
    // difficulty.streakGrowth per hit, capped at difficulty.streakCap.
    if (streak < STREAK_MULTIPLIER_START) return 1;
    const m = 1.5 + (streak - STREAK_MULTIPLIER_START) * difficulty.streakGrowth;
    return Math.min(difficulty.streakCap, m);
  }

  // Camera world position cached for shot-quality calculation
  const _camWorldPos = new THREE.Vector3();
  const _toCamera = new THREE.Vector3();

  // Shot quality from world-space surface normal vs camera direction.
  // Returns 0..1 where 1.0 is dead-center (normal points at camera) and
  // 0.0 is a perfect glancing hit (normal perpendicular to view ray).
  function shotQuality(worldPoint, worldNormal) {
    camera.getWorldPosition(_camWorldPos);
    _toCamera.copy(_camWorldPos).sub(worldPoint).normalize();
    const dot = worldNormal.dot(_toCamera);
    return Math.max(0, Math.min(1, dot));
  }

  // Dartboard tiers: quality → {label, basePoints, damage}.
  // Calibrated so bullseyes are rare-ish and rewarding, edge hits still count
  // but feel weak. Average random hit ~0.7 quality (sphere geometry tends
  // toward facing the camera), so the tiers cluster appropriately.
  function dartTier(q) {
    if (q >= 0.92) return { label: 'BULLSEYE', points: 100, damage: 18 };
    if (q >= 0.80) return { label: 'CENTER',   points: 60,  damage: 13 };
    if (q >= 0.65) return { label: 'INNER',    points: 35,  damage: 9  };
    if (q >= 0.45) return { label: 'OUTER',    points: 18,  damage: 6  };
    return                  { label: 'GRAZE',    points: 8,   damage: 3  };
  }

  function handlePoint(clientX, clientY) {
    if (!alive) return false;
    pointer.x = (clientX / window.innerWidth) * 2 - 1;
    pointer.y = -(clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    const hits_arr = raycaster.intersectObject(eggMesh, false);
    if (hits_arr.length === 0) {
      streak = 0;                       // missing breaks the streak
      updateDebugHud();
      return false;
    }

    const hit = hits_arr[0];
    const worldPoint = hit.point.clone();
    const worldNormal = hit.face.normal.clone()
      .transformDirection(eggMesh.matrixWorld).normalize();
    const localPoint = eggMesh.worldToLocal(hit.point.clone());
    const localNormal = hit.face.normal.clone();

    // Dartboard scoring
    const q = shotQuality(worldPoint, worldNormal);
    const tier = dartTier(q);
    const mult = currentMultiplier();
    const earnedPoints = Math.round(tier.points * mult);
    const dmg = tier.damage;            // damage is NOT multiplied (would make streaks too snowbally)

    pointsAccumulated += earnedPoints;
    hits++;
    streak++;
    hp -= dmg;

    spawnSpurt(worldPoint, worldNormal);
    spawnCrack(localPoint, localNormal);
    squashEgg();
    if (debugMode) spawnDamagePopup(worldPoint, dmg);

    updateHealthBar();
    updateDebugHud();

    if (hp <= 0) {
      die(); // plays splat — no crack on the killing blow
    } else {
      playHitSound();
    }
    return true;
  }

  // ---------- HUD: shots, timer, score ----------
  // Timer starts on first shot, not page load, so reading the title doesn't
  // count against the player. Score is computed only at death.
  let shots = 0;
  let roundStartMs = 0;
  let roundElapsedMs = 0;     // frozen at death
  let timerRunning = false;
  let score = null;

  function updateShotsDisplay() {
    shotsNumEl.textContent = shots;
  }
  function updateTimeDisplay() {
    const ms = timerRunning ? (performance.now() - roundStartMs) : roundElapsedMs;
    timeNumEl.textContent = (ms / 1000).toFixed(1);
  }

  // Score formula (HP is fixed per difficulty, so we don't normalize against it):
  //   pointsAccumulated × accuracy × speed × difficulty.pointsMultiplier
  // speed = 10 / seconds — calibrated so a 10-second run yields a 1.0 bonus.
  // Hard mode bakes a 1.5× points bonus on top so Hard runs reach higher
  // tiers (GOLDEN YOLK is effectively Hard-only territory).
  function computeScore() {
    if (shots === 0) return 0;
    const seconds = Math.max(0.1, roundElapsedMs / 1000);
    const accuracy = hits / shots;
    const speed = 10 / seconds;
    const final = pointsAccumulated * accuracy * speed * difficulty.pointsMultiplier;
    return Math.round(final);
  }

  // Map score to an egg-themed rating plus a medal tier. Single source of
  // truth for both — bumping a cutoff updates the rating and the medal color
  // together. Tiers ordered high → low.
  const SCORE_TIERS = [
    { min: 4000, rating: 'Golden Yolk',   tier: 'gold'   },
    { min: 2200, rating: 'Sunny Side Up', tier: 'silver' },
    { min: 1200, rating: 'Over Easy',     tier: 'bronze' },
    { min:  600, rating: 'Soft Boiled',   tier: 'copper' },
    { min:  200, rating: 'Scrambled',     tier: 'iron'   },
    { min:    0, rating: 'Runny',         tier: 'rust'   }
  ];
  function scoreTierFor(s) {
    for (const t of SCORE_TIERS) if (s >= t.min) return t;
    return SCORE_TIERS[SCORE_TIERS.length - 1];
  }

  const ALL_TIER_CLASSES = SCORE_TIERS.map(t => 'tier-' + t.tier);

  function showScoreReveal(s) {
    const tier = scoreTierFor(s);
    scoreValueEl.textContent = s;
    scoreRatingEl.textContent = tier.rating;
    // Force a reflow so the .show class triggers the animation reliably
    // even when called soon after a previous removal.
    scoreRevealEl.classList.remove('show', ...ALL_TIER_CLASSES);
    void scoreRevealEl.offsetWidth;
    scoreRevealEl.classList.add('show', 'tier-' + tier.tier);
  }
  function hideScoreReveal() {
    scoreRevealEl.classList.remove('show', ...ALL_TIER_CLASSES);
  }

  renderer.domElement.addEventListener('pointerdown', (e) => {
    if (!alive) return;
    if (!timerRunning) {
      roundStartMs = performance.now();
      timerRunning = true;
      setDifficultyLock(true);              // lock difficulty for the duration of the round
    }
    shots++;
    updateShotsDisplay();
    const hit = handlePoint(e.clientX, e.clientY);
    if (!hit) playRicochetSound();
  });

  // ---------- Death ----------
  const debris = [];
  let yolkPuddle = null;
  let albuminPuddle = null;

  function die() {
    alive = false;
    eggMesh.visible = false;

    // Snapshot where the egg died — debris must spawn here, not at the origin,
    // since the egg has been hopping around.
    const deathX = eggGroup.position.x;
    const deathZ = eggGroup.position.z;

    // Stop any in-flight hop motion
    hop.airborne = false;
    hop.vx = 0; hop.vy = 0;

    // Albumin puddle
    const aGeo = new THREE.CircleGeometry(1.35, 48);
    const ap = aGeo.attributes.position;
    for (let i = 0; i < ap.count; i++) {
      const x = ap.getX(i), y = ap.getY(i);
      if (x === 0 && y === 0) continue;
      const wob = 0.78 + Math.random()*0.42;
      ap.setX(i, x * wob);
      ap.setY(i, y * wob);
    }
    ap.needsUpdate = true;
    const aMat = new THREE.MeshStandardMaterial({
      color: 0xfff5dc,
      transparent: true, opacity: 0.92,
      roughness: 0.15, metalness: 0,
      polygonOffset: true,
      polygonOffsetFactor: -2,
      polygonOffsetUnits: -2,
      depthWrite: false
    });
    albuminPuddle = new THREE.Mesh(aGeo, aMat);
    albuminPuddle.rotation.x = -Math.PI/2;
    albuminPuddle.position.set(deathX, 0.012, deathZ);
    albuminPuddle.scale.set(0.01, 0.01, 0.01);
    scene.add(albuminPuddle);

    // Yolk dome (hemisphere, slightly squashed)
    const yGeo = new THREE.SphereGeometry(0.42, 32, 16, 0, Math.PI*2, 0, Math.PI/2);
    const yMat = new THREE.MeshStandardMaterial({
      color: 0xff9b1a,
      emissive: 0x3a1f00, emissiveIntensity: 0.3,
      roughness: 0.2, metalness: 0
    });
    yolkPuddle = new THREE.Mesh(yGeo, yMat);
    yolkPuddle.position.set(deathX, 0.018, deathZ);
    yolkPuddle.scale.set(0.01, 0.004, 0.01);
    yolkPuddle.castShadow = true;
    scene.add(yolkPuddle);

    // Shell fragments
    const fragCount = 10;
    for (let i = 0; i < fragCount; i++) {
      const w = 0.14 + Math.random()*0.12;
      const h = w * (0.6 + Math.random()*0.5);
      const geo = new THREE.PlaneGeometry(w, h);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xfaf2dd,
        side: THREE.DoubleSide,
        roughness: 0.55, metalness: 0.04,
        map: makeShellTexture()
      });
      const m = new THREE.Mesh(geo, mat);
      const angle = (i / fragCount) * Math.PI * 2 + Math.random()*0.4;
      m.position.set(
        deathX + Math.cos(angle) * 0.15,
        EGG_Y + (Math.random() - 0.2) * 0.4,
        deathZ + Math.sin(angle) * 0.15
      );
      m.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
      m.castShadow = true;
      scene.add(m);
      const speed = 2.2 + Math.random()*2.0;
      const v = new THREE.Vector3(
        Math.cos(angle) * speed,
        2.2 + Math.random()*2.0,
        Math.sin(angle) * speed
      );
      const angVel = new THREE.Vector3(
        (Math.random()-0.5)*9,
        (Math.random()-0.5)*9,
        (Math.random()-0.5)*9
      );
      debris.push({ mesh: m, vel: v, angVel, settled: false });
    }

    playSplatSound();

    // Freeze timer, compute score
    if (timerRunning) {
      roundElapsedMs = performance.now() - roundStartMs;
      timerRunning = false;
    }
    score = computeScore();
    updateTimeDisplay();

    // Let the splat have its moment first, then land the score reveal.
    // 600ms lets the splat sound play out and the puddle start spreading.
    setTimeout(() => { showScoreReveal(score); }, 600);
    setTimeout(() => { resetBtn.style.display = 'block'; }, 1100);
  }

  // ---------- Reset ----------
  function reset() {
    startingHP = difficulty.hp;
    hp = startingHP;
    alive = true;
    eggMesh.visible = true;

    cracks.forEach(c => eggMesh.remove(c));
    cracks.length = 0;

    particles.forEach(p => scene.remove(p.mesh));
    particles.length = 0;

    splats.forEach(s => scene.remove(s));
    splats.length = 0;

    debris.forEach(d => scene.remove(d.mesh));
    debris.length = 0;

    if (albuminPuddle) { scene.remove(albuminPuddle); albuminPuddle = null; }
    if (yolkPuddle)    { scene.remove(yolkPuddle);    yolkPuddle = null; }

    // Clear any lingering damage popups
    damagePopups.forEach(p => p.el.remove());
    damagePopups.length = 0;

    eggGroup.position.set(0, EGG_Y, 0);
    eggGroup.scale.set(1, 1, 1);
    squashing = false;
    hop.vx = 0; hop.vy = 0;
    hop.airborne = false;
    hop.restTimer = 0.6;                        // brief pause before first hop
    hop.dir = Math.random() < 0.5 ? -1 : 1;
    hop.committedDir = hop.dir;
    hop.mode = 'run';
    hop.hopsLeft = 3;
    shots = 0;
    hits = 0;
    streak = 0;
    pointsAccumulated = 0;
    roundElapsedMs = 0;
    timerRunning = false;
    score = null;
    setDifficultyLock(false);                 // allow difficulty change before next round
    updateShotsDisplay();
    updateTimeDisplay();
    updateDebugHud();
    hideScoreReveal();
    resetBtn.style.display = 'none';
    updateHealthBar();
  }
  resetBtn.addEventListener('click', reset);
  titleEl.addEventListener('click', reset);

  let audioCtx;
  let splatBuffer = null;
  let ricochetBuffer = null;

  function getAudio() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Decode the embedded MP3 splat sound once; reuse the buffer for all plays.
        decodeSplatSound();
        decodeRicochetBank();
      } catch(e) {}
    }
    // Browsers may suspend the context after a period of silence or tab
    // inactivity. Resuming on every play call ensures audio survives across
    // resets and long sessions.
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    return audioCtx;
  }

  function decodeSplatSound() {
    if (splatBuffer || !audioCtx) return;
    try {
      const bin = atob(SPLAT_SOUND_B64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      audioCtx.decodeAudioData(
        bytes.buffer,
        (buf) => { splatBuffer = buf; },
        (err) => { console.error('Splat decode failed:', err); }
      );
    } catch (e) {
      console.error('Splat load error:', e);
    }
  }

  function decodeRicochetBank() {
    if (ricochetBuffer || !audioCtx) return;
    try {
      const bin = atob(RICOCHET_SOUND_B64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      audioCtx.decodeAudioData(
        bytes.buffer,
        (buf) => { ricochetBuffer = buf; },
        (err) => { console.error('Ricochet decode failed:', err); }
      );
    } catch (e) {
      console.error('Ricochet load error:', e);
    }
  }

  function playHitSound() {
    // Eggshell crack: brief band-passed noise burst at high frequency,
    // plus a tiny tonal click for body. No pitched sweep (no pew).
    const ctx = getAudio(); if (!ctx) return;
    const t = ctx.currentTime;

    // Main crack: short noise burst, bandpass'd around 2.5–4 kHz
    const dur = 0.06;
    const buf = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate * dur)), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const fade = 1 - i / d.length;
      d[i] = (Math.random()*2 - 1) * Math.pow(fade, 3);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 2400 + Math.random() * 1600;
    bp.Q.value = 1.4;
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 1400;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.605, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    noise.connect(bp); bp.connect(hp); hp.connect(g); g.connect(ctx.destination);
    noise.start(t);

    // Tiny tonal click for shell-body resonance
    const osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = 1100 + Math.random() * 700;
    const og = ctx.createGain();
    og.gain.setValueAtTime(0.077, t);
    og.gain.exponentialRampToValueAtTime(0.0001, t + 0.022);
    osc.connect(og); og.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.03);
  }

  // Track the last clip played so we don't repeat back-to-back. The bank has
  // 22 clips, so a simple "not the same as last time" rule is plenty.
  let lastRicochetIdx = -1;

  function playRicochetSound() {
    const ctx = getAudio(); if (!ctx) return;

    // Buffer not decoded yet (first click before user gesture finishes
    // unblocking audio) → fall back to procedural ricochet.
    if (!ricochetBuffer) { playProceduralRicochet(); return; }

    // Pick a random clip from the bank, avoiding immediate repeats
    let idx = Math.floor(Math.random() * RICOCHET_OFFSETS.length);
    if (idx === lastRicochetIdx) idx = (idx + 1) % RICOCHET_OFFSETS.length;
    lastRicochetIdx = idx;
    const [offset, duration] = RICOCHET_OFFSETS[idx];

    const src = ctx.createBufferSource();
    src.buffer = ricochetBuffer;
    const g = ctx.createGain();
    g.gain.value = 0.63;                        // 10% quieter than before
    src.connect(g); g.connect(ctx.destination);
    src.start(0, offset, duration);
  }

  function playProceduralRicochet() {
    // Fallback: synthesized metallic ping for when the MP3 bank isn't decoded.
    const ctx = getAudio(); if (!ctx) return;
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    const startFreq = 1700 + Math.random() * 600;
    osc.frequency.setValueAtTime(startFreq, t);
    osc.frequency.exponentialRampToValueAtTime(startFreq * 0.5, t + 0.09);
    const og = ctx.createGain();
    og.gain.setValueAtTime(0.0, t);
    og.gain.linearRampToValueAtTime(0.198, t + 0.004);
    og.gain.exponentialRampToValueAtTime(0.0008, t + 0.12);
    osc.connect(og); og.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.13);
  }

  function playSplatSound() {
    // Spawn a fresh BufferSource on each play — they're cheap and one-shot,
    // which means no state to manage and reliable replay.
    const ctx = getAudio(); if (!ctx || !splatBuffer) return;
    const src = ctx.createBufferSource();
    src.buffer = splatBuffer;
    const g = ctx.createGain();
    g.gain.value = 1.0;
    src.connect(g); g.connect(ctx.destination);
    src.start();
  }

  // ---------- Animate ----------
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.vel.y += GRAVITY * dt;
      p.mesh.position.x += p.vel.x * dt;
      p.mesh.position.y += p.vel.y * dt;
      p.mesh.position.z += p.vel.z * dt;
      if (p.mesh.position.y <= 0.02) {
        spawnSplat(p.mesh.position.x, p.mesh.position.z, p.type, p.size);
        scene.remove(p.mesh);
        particles.splice(i, 1);
      }
    }

    // Debris
    for (const d of debris) {
      if (d.settled) continue;
      d.vel.y += GRAVITY * dt;
      d.mesh.position.x += d.vel.x * dt;
      d.mesh.position.y += d.vel.y * dt;
      d.mesh.position.z += d.vel.z * dt;
      d.mesh.rotation.x += d.angVel.x * dt;
      d.mesh.rotation.y += d.angVel.y * dt;
      d.mesh.rotation.z += d.angVel.z * dt;
      if (d.mesh.position.y <= 0.05) {
        d.mesh.position.y = 0.05 + Math.random()*0.02;
        d.vel.set(0, 0, 0);
        d.angVel.set(0, 0, 0);
        d.settled = true;
      }
    }

    // Puddles grow in
    if (albuminPuddle && albuminPuddle.scale.x < 1) {
      const s = Math.min(1, albuminPuddle.scale.x + dt * 1.6);
      albuminPuddle.scale.set(s, s, s);
    }
    if (yolkPuddle && yolkPuddle.scale.x < 1) {
      const s = Math.min(1, yolkPuddle.scale.x + dt * 1.3);
      yolkPuddle.scale.set(s, 0.4 * s, s);
    }

    updateSquash(dt);
    updateHop(dt);
    positionHealthBar();
    positionDebugHp();
    updateDamagePopups();
    if (timerRunning) updateTimeDisplay();
    if (timerRunning && debugMode) updateDebugHud();
    renderer.render(scene, camera);
  }

  // ---------- Resize ----------
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------- Init ----------
  buildHealthBar();
  updateHealthBar();
  animate();
})();
</script>
</body>
</html>
